<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novidades em Breve | Site em Construção</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #111119 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 1.1rem;
            color: #b3b3b3;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .form-group {
            display: flex;
            gap: 10px;
            max-width: 450px;
            margin: 0 auto;
        }
        input[type="email"] {
            flex: 1;
            padding: 15px;
            border: 1px solid #33334d;
            border-radius: 8px;
            background-color: #1a1a26;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        input[type="email"]:focus {
            border-color: #007bff;
        }
        button {
            padding: 15px 25px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .form-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Ícone visual (pode ser substituído pela sua logo <img src="logo.png">) -->
        <div class="icon">RAZIS TECNOLOGIA</div>
        
        <h1>Estamos preparando algo incrível!</h1>
        <p>Nosso site está em construção para trazer a melhor experiência possível para você.</p>
        
    </div>

</body>
</html>
